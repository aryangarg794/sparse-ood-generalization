_target_: sparse_generalization.models.transformer.TransformerLit

embed_size: 3
out_dim: 1 
layernorm: true
agg_pool: false
use_grid: true
model_dim: 62
num_feature_layers: 3
num_layers: 4
include_sparsity: false
l1_weight: 0.0001
positional_encoding: true
lr: 2.5e-4
lagrangian: false
start_lambda: 5e6
target_loss: 0.15
cma: 0.9
step_size: 1e-1
noisy_grads: false
eta: 1.0
gamma: 0.55
noisy_bern: false
beta1: 0.95
beta2: 0.999
foopt: false
residual: True
num_heads: 4
hidden_dims: [128, 128]
dropout: 0.0

mha_layer:
  _partial_: true
  _target_: sparse_generalization.layers.thresh_mha.MultiHeadAttentionThresh
  threshold: 0.0


sparse_loss: 
  _partial_: true
  _target_: sparse_generalization.losses.sparse_loss.EntropyLoss